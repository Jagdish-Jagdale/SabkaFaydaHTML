<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Checkout on Sabka Fayda. Review your items, delivery details, and price summary.">
    <title>Checkout | Sabka Fayda</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500;700&family=Rubik:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="assets/css/main.css?v=15">

    <!-- Preload Logo Image -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">

    <!-- Checkout Mock Data -->
    <script src="assets/js/checkout-mock.js"></script>
    <script src="assets/js/renderCheckout.js"></script>

    <style>
        .product-card:hover .product-card-overlay {
            opacity: 1 !important;
        }
        .product-card:hover .product-wishlist-btn {
            opacity: 1 !important;
        }
    </style>

    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body style="font-family: 'Roboto', sans-serif; background-color: #f7f9fa; overflow-x: hidden;">

    <!-- Header Placeholder -->
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <!-- Main Content -->
    <div class="main-content" style="padding-top: 155px; min-height: 100vh;">
        <div class="container py-4">

            <!-- Main Checkout Row -->
            <div class="row g-4 mb-5">

                <!-- Left Column: Delivery details & Item card -->
                <div class="col-lg-8">

                    <!-- Delivery Section -->
                    <div id="delivery-address-container" class="bg-white rounded-3 p-3 mb-4 shadow-sm" style="border: 1px solid #eef2f5;"></div>

                    <!-- Product Items Container -->
                    <div id="products-container"></div>

                </div>

                <!-- Right Column: Price summary card that sticks on scroll -->
                <div class="col-lg-4">
                    <div id="price-summary-container" class="bg-white rounded-3 p-3 shadow-sm border d-flex flex-column justify-content-between"
                        style="border-color: #eef2f5 !important; background-color: #ffffff; position: sticky; top: 175px; align-self: start;"></div>
                </div>

            </div>

            <!-- Explore Similar Products Section (Full Width, 5 Cards in a Row) -->
            <div class="bg-white rounded-3 p-4 mb-4 shadow-sm" style="border: 1px solid #eef2f5;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h5 class="fw-bold text-dark mb-1"
                            style="font-family: 'Montserrat', sans-serif; font-size: 1.25rem;">Explore Similar Products
                        </h5>
                        <p class="text-muted mb-0" style="font-size: 0.85rem; font-weight: 500;">There products you may
                            like similarly</p>
                    </div>
                    <a href="#" class="btn btn-primary px-4 rounded-pill d-none d-sm-inline-block"
                        style="background-color: #0087F6; border: none; font-size: 0.85rem; font-weight: 600; padding: 8px 24px;">View
                        All</a>
                </div>

                <div id="similar-products-container" class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-2 g-md-3"></div>
            </div>

            <!-- Peoples Looking for these Products Section (Full Width, 5 Cards in a Row) -->
            <div class="bg-white rounded-3 p-4 shadow-sm" style="border: 1px solid #eef2f5;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h5 class="fw-bold text-dark mb-1"
                            style="font-family: 'Montserrat', sans-serif; font-size: 1.25rem;">Peoples Looking for these
                            Products</h5>
                        <p class="text-muted mb-0" style="font-size: 0.85rem; font-weight: 500;">lots of people buying
                            those</p>
                    </div>
                    <a href="#" class="btn btn-primary px-4 rounded-pill d-none d-sm-inline-block"
                        style="background-color: #0087F6; border: none; font-size: 0.85rem; font-weight: 600; padding: 8px 24px;">View
                        All</a>
                </div>

                <div id="peoples-products-container" class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-2 g-md-3"></div>
            </div>

        </div>
    </div>

    <!-- Mobile Sticky Footer Bar for Checkout -->
    <div id="mobile-footer-container" class="fixed-bottom bg-white border-top p-3 d-block d-lg-none" style="z-index: 1020;">
        <div class="container d-flex justify-content-between align-items-center"></div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Mock JS -->
    <script src="assets/js/authcontext.js"></script>

    <!-- Script to load Header/Footer dynamically & interactions -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Load Header
            fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                });

            // Load Footer
            fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        });
    </script>
</body>

</html>
