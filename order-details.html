<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="View detailed information about your Sabka Fayda order #SF2026001254. Check delivery status, summary, shipping, payment methods, and tracking logs.">
    <meta name="keywords"
        content="Sabka Fayda order details, order status, track shipment, invoice download, customer support">
    <title>Order Details #SF2026001254 | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css?v=15">

    <!-- Preload Logo Image -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">

    <!-- Order Details Mock Data -->
    <script src="assets/js/order-details-mock.js"></script>
    <script src="assets/js/renderOrderDetails.js"></script>

    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body class="orders-page">
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <main class="orders-shell container-fluid px-3 px-md-4">

        <!-- Mobile Sidebar Toggle Row -->
        <div class="d-lg-none d-flex align-items-center mb-3 bg-white p-3 rounded-4 shadow-sm"
            style="border: 1px solid #eef2f6;">
            <button class="btn btn-link p-0 me-3 border-0 text-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="fa-solid fa-bars fs-3"></i>
            </button>
            <span class="fw-bold fs-5 text-dark">Order Details</span>
        </div>

        <div class="row g-4">
            <!-- ═══ SIDEBAR ═══ -->
            <aside class="col-lg-3" id="sidebar-placeholder"><div class="skeleton-box skeleton-sidebar d-none d-lg-block"></div></aside>

            <!-- ═══ MAIN CONTENT ═══ -->
            <section class="col-lg-9 col-12">
                <!-- Blue Gradient Header Banner -->
                <div id="order-banner-container" class="order-details-banner"></div>

                <!-- Row 1: Order Status Timeline & Order Summary -->
                <div class="row g-4 mb-4">
                    <!-- Left: Order Status Card -->
                    <div class="col-xl-8 col-lg-7">
                        <div class="details-card h-100">
                            <h5 class="details-card-title"><i class="fa-solid fa-circle-dot"></i> Order Status</h5>
                            <div id="timeline-container"></div>
                        </div>
                    </div>

                    <!-- Right: Order Summary Card -->
                    <div class="col-xl-4 col-lg-5">
                        <div id="order-summary-container" class="details-card h-100 d-flex flex-column justify-content-between"></div>
                    </div>
                </div>

                <!-- Row 2: Product Details, Delivery Address & Payment Information -->
                <div class="row g-4 mb-4">
                    <!-- Product Details Card -->
                    <div class="col-lg-4 col-md-6">
                        <div id="product-details-container" class="details-card h-100 d-flex flex-column justify-content-between"></div>
                    </div>

                    <!-- Delivery Address Card -->
                    <div class="col-lg-4 col-md-6">
                        <div id="delivery-address-container" class="details-card h-100 d-flex flex-column justify-content-between"></div>
                    </div>

                    <!-- Payment Information Card -->
                    <div class="col-lg-4 col-md-12">
                        <div id="payment-info-container" class="details-card h-100"></div>
                    </div>
                </div>

                <!-- Row 3: Order Tracking History -->
                <div id="tracking-history-container" class="details-card mb-4"></div>

                <!-- Row 4: Return/Replace window, Support actions, More actions -->
                <div class="row g-4">
                    <!-- Return/Replace -->
                    <div class="col-lg-4 col-md-6">
                        <div id="return-info-container" class="details-card h-100 d-flex flex-column justify-content-between"></div>
                    </div>

                    <!-- Need Help? -->
                    <div class="col-lg-4 col-md-6">
                        <div class="details-card h-100 d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="details-card-title"><i class="fa-regular fa-circle-question"></i> Need Help?
                                </h5>
                                <div class="mb-3 small">
                                    <p class="text-secondary mb-0">We are here to help you</p>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <div class="d-flex gap-2">
                                    <button
                                        class="btn btn-outline-primary flex-grow-1 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                        style="border-radius: 8px; font-size: 0.78rem;">
                                        <i class="fa-solid fa-phone"></i> Contact Support
                                    </button>
                                    <button
                                        class="btn btn-outline-primary flex-grow-1 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                        style="border-radius: 8px; font-size: 0.78rem;">
                                        <i class="fa-solid fa-comments"></i> Chat Support
                                    </button>
                                </div>
                                <button
                                    class="btn btn-outline-danger w-100 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                    style="border-radius: 8px; font-size: 0.78rem;">
                                    <i class="fa-solid fa-circle-exclamation"></i> Raise Complaint
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- More Actions -->
                    <div class="col-lg-4 col-md-12">
                        <div class="details-card h-100 d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="details-card-title"><i class="fa-solid fa-ellipsis"></i> More Actions</h5>
                                <div class="mb-3 small">
                                    <p class="text-secondary mb-0">Options for your order</p>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <div class="d-flex gap-2">
                                    <button
                                        class="btn btn-primary flex-grow-1 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                        style="border-radius: 8px; font-size: 0.78rem;">
                                        <i class="fa-solid fa-rotate-right"></i> Buy Again
                                    </button>
                                    <button
                                        class="btn btn-outline-primary flex-grow-1 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                        style="border-radius: 8px; font-size: 0.78rem;">
                                        <i class="fa-solid fa-share-nodes"></i> Share Order
                                    </button>
                                </div>
                                <button
                                    class="btn btn-outline-danger w-100 py-2 fw-semibold d-flex align-items-center justify-content-center gap-1"
                                    style="border-radius: 8px; font-size: 0.78rem;" disabled>
                                    <i class="fa-solid fa-circle-xmark"></i> Cancel Order
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/loginmock.js"></script>
    <script src="assets/js/main.js?v=6"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof loadSidebar === 'function') loadSidebar();

            // Load header
            fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                });

            // Load footer
            fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        });
    </script>
</body>

</html>
