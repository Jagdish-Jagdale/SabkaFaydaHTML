<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (!localStorage.getItem('sf_auth_user')) {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Manage your Sabka Fayda account. Update your personal information, address, wallet, wishlist, notifications, cart and coupons all in one place.">
    <meta name="keywords"
        content="Sabka Fayda profile, my account, personal information, my orders, my wallet, my wishlist, my cart, my coupons, saved UPI">
    <title>My Information | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS (includes profile styles) -->
    <link rel="stylesheet" href="assets/css/main.css?v=27">
    <!-- Preload Logo and Header Data -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">
    <link rel="preload" href="assets/js/mockCategories.js" as="script">


    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body class="orders-page">

    <!-- Site Header -->
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <!-- Page Main Shell -->
    <main class="orders-shell container-fluid px-3 px-md-4">
        
        <!-- Mobile Sidebar Toggle Row -->
        <div class="d-lg-none d-flex align-items-center mb-3 bg-white p-3 rounded-4 shadow-sm" style="border: 1px solid #eef2f6;">
            <button class="btn btn-link p-0 me-3 border-0 text-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="fa-solid fa-bars fs-3"></i>
            </button>
            <span class="fw-bold fs-5 text-dark">My Information</span>
        </div>

        <div class="row g-4">

            <!-- ═══ SIDEBAR ═══ -->
            <div class="col-lg-3" id="sidebar-placeholder"><div class="skeleton-box skeleton-sidebar d-none d-lg-block"></div></div>

            <!-- ═══ MAIN CONTENT ═══ -->
            <div class="col-lg-9 col-12 content-card" style="padding: 0; overflow: hidden;">

                <!-- Main card -->
                <div class="overflow-hidden profile-main-card">

                    <!-- Welcome Banner -->
                    <div class="welcome-banner d-flex align-items-center gap-3 px-4 py-4 position-relative overflow-hidden">
                        <!-- Editable Avatar -->
                        <div class="position-relative" style="flex-shrink:0;">
                            <div class="welcome-avatar rounded-circle d-flex align-items-center justify-content-center" id="avatarPreview">
                                <i class="fa-solid fa-user" id="avatarIcon"></i>
                                <img id="avatarImg" src="" alt="Profile" class="d-none" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
                            </div>
                            <!-- Edit overlay button -->
                            <label for="avatarInput" title="Change photo"
                                style="position:absolute; bottom:0; right:0; background:#0087F6; color:#fff; border:2px solid #fff; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.65rem; box-shadow:0 2px 6px rgba(0,0,0,.2);">
                                <i class="fa-solid fa-pen"></i>
                            </label>
                            <input type="file" id="avatarInput" accept="image/*" class="d-none" onchange="previewAvatar(event)">
                        </div>
                        <div>
                            <p class="mb-0 fw-medium text-secondary" style="font-size:.85rem;">Welcome,</p>
                            <h2 class="mb-0 fw-bold" id="displayUserName" style="font-size:1.5rem; color:#1a1a2e;">User</h2>
                        </div>
                    </div>

                    <!-- My Information Form -->
                    <div class="p-4" id="panel-myinfo">
                        <form id="profile-form" onsubmit="saveProfile(event)">
                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label fw-semibold small text-secondary" for="firstName">First Name <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="firstName"
                                        placeholder="Enter your first name" value="" maxlength="50"
                                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-firstName"></div>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-semibold small text-secondary" for="lastName">Last Name <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="lastName"
                                        placeholder="Enter your last name" value="" maxlength="50"
                                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-lastName"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small text-secondary" for="gender">Gender</label>
                                <select class="profile-form-control" id="gender">
                                    <option value="" selected disabled>Select your gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                    <option value="prefer-not">Prefer not to say</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small text-secondary" for="mobile">Mobile Number <span class="text-danger">*</span></label>
                                <input type="tel" class="profile-form-control" id="mobile"
                                    placeholder="Enter 10-digit mobile number (starts with 6-9)" value="" maxlength="10"
                                    oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                <div class="invalid-feedback-custom d-none" id="err-mobile"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold small text-secondary" for="email">Email Address <span class="text-danger">*</span></label>
                                <input type="email" class="profile-form-control" id="email"
                                    placeholder="Enter your email address" value="">
                                <div class="invalid-feedback-custom d-none" id="err-email"></div>
                            </div>

                            <button type="submit" class="btn-profile-save" id="btn-save-info">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
                            </button>
                        </form>
                    </div>

                </div><!-- /main-card -->

                <!-- FAQ Section -->
                <div class="faq-section mt-4 p-4">
                    <h4 class="fw-bold mb-4" style="font-size:1rem; color:#1a1a2e; font-family: 'Montserrat', sans-serif;">FAQ - Customer Data Privacy</h4>
                    <div id="faq-container">
                        <!-- Populated dynamically from mockFAQData.js -->
                    </div>
                </div><!-- /faq -->

            </div><!-- /main col -->
        </div><!-- /row -->
    </main><!-- /container -->

    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <!-- Include Floating WhatsApp -->
    <div id="whatsapp-float-placeholder"></div>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999; margin-top: 90px;">
        <div id="save-toast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toast-msg">
                    <i class="fa-solid fa-circle-check me-2"></i>Saved successfully!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login Mock JS -->
    <script src="assets/js/authcontext.js"></script>
    <!-- Main JS (header init) -->
    <script src="assets/js/main.js?v=6"></script>
    <!-- FAQ Mock Data -->
    <script src="assets/js/mockFAQData.js"></script>

    <!-- Load Header & Sidebar -->
    <script>
        if (typeof loadSidebar === 'function') loadSidebar();
        fetch('header.html?v=5')
            .then(r => r.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
                if (typeof initHeader === 'function') initHeader();
                if (typeof updateLoginButton === 'function') updateLoginButton();
            });

        fetch('footer.html?v=5')
            .then(r => r.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });

        // Load Floating WhatsApp
        fetch('whatsapp-float.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('whatsapp-float-placeholder').innerHTML = html;
            });
    </script>

    <script>
        /* Render FAQ from mockFAQData */
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('faq-container');
            if (container && typeof mockFAQData !== 'undefined') {
                container.innerHTML = mockFAQData.map((item, i) => `
                    <div class="${i === mockFAQData.length - 1 ? 'mb-0' : 'mb-3'}">
                        <p class="faq-question mb-1">Q: ${item.question}</p>
                        <div class="faq-answer">A: ${item.answer}</div>
                    </div>
                `).join('');
            }
        });

        /* Avatar preview */
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('avatarImg');
                const icon = document.getElementById('avatarIcon');
                img.src = e.target.result;
                img.classList.remove('d-none');
                if (icon) icon.classList.add('d-none');
            };
            reader.readAsDataURL(file);
        }

        /* Show field error helper */
        function showProfileError(fieldId, errId, message) {
            const field = document.getElementById(fieldId);
            const errEl = document.getElementById(errId);
            if (field) field.style.borderColor = '#dc3545';
            if (errEl) {
                errEl.textContent = message;
                errEl.classList.remove('d-none');
            }
        }

        /* Save profile with validation */
        function saveProfile(e) {
            e.preventDefault();

            const firstName = (document.getElementById('firstName').value || '').trim();
            const lastName  = (document.getElementById('lastName').value || '').trim();
            const mobile    = (document.getElementById('mobile').value || '').trim();
            const email     = (document.getElementById('email').value || '').trim();

            // Clear previous errors
            document.querySelectorAll('.invalid-feedback-custom').forEach(el => {
                el.classList.add('d-none');
                el.textContent = '';
            });
            document.querySelectorAll('.profile-form-control').forEach(el => el.style.borderColor = '');

            let hasError = false;

            // First Name: letters & spaces only, required
            if (!firstName) {
                showProfileError('firstName', 'err-firstName', 'First name is required');
                hasError = true;
            } else if (!/^[a-zA-Z\s]+$/.test(firstName)) {
                showProfileError('firstName', 'err-firstName', 'Only letters and spaces allowed');
                hasError = true;
            }

            // Last Name: letters & spaces only, required
            if (!lastName) {
                showProfileError('lastName', 'err-lastName', 'Last name is required');
                hasError = true;
            } else if (!/^[a-zA-Z\s]+$/.test(lastName)) {
                showProfileError('lastName', 'err-lastName', 'Only letters and spaces allowed');
                hasError = true;
            }

            // Mobile: exactly 10 digits, must start with 6-9
            if (!mobile) {
                showProfileError('mobile', 'err-mobile', 'Mobile number is required');
                hasError = true;
            } else if (!/^[0-9]+$/.test(mobile)) {
                showProfileError('mobile', 'err-mobile', 'Only digits are allowed');
                hasError = true;
            } else if (mobile.length !== 10) {
                showProfileError('mobile', 'err-mobile', 'Mobile number must be exactly 10 digits');
                hasError = true;
            } else if (parseInt(mobile[0]) <= 5) {
                showProfileError('mobile', 'err-mobile', 'Mobile number must start with 6, 7, 8 or 9');
                hasError = true;
            }

            // Email: valid email format
            if (!email) {
                showProfileError('email', 'err-email', 'Email address is required');
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showProfileError('email', 'err-email', 'Enter a valid email address (e.g. name@example.com)');
                hasError = true;
            }

            if (hasError) return;

            document.getElementById('toast-msg').innerHTML =
                '<i class="fa-solid fa-circle-check me-2"></i>Profile saved successfully!';
            new bootstrap.Toast(document.getElementById('save-toast'), { delay: 3000 }).show();
        }

        /* Populate user data if logged in */
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof getAuthUser === 'function') {
                const user = getAuthUser();
                if (user) {
                    if (user.mobile) {
                        document.getElementById('mobile').value = user.mobile;
                    }
                    if (user.name) {
                        document.getElementById('displayUserName').textContent = user.name;
                        document.getElementById('firstName').value = user.name;
                    }
                }
            }
        });
    </script>
</body>
</html>
