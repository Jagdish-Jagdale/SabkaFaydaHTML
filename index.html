<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sabka Fayda is your ultimate e-commerce marketplace for the best deals, offers, and high-quality products across all categories. Shop electronics, fashion, beauty, and more.">
    <meta name="keywords"
        content="Sabka Fayda, e-commerce, online shopping, buy online, electronics, fashion, best deals, India shopping, marketplace, offers">
    <title>Home | Sabka Fayda</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Rubik:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Main CSS -->
    <link class="main-stylesheet" rel="stylesheet" href="assets/css/main.css?v=15">
    
    <!-- Preload Logo Image -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">
    <link rel="preload" href="assets/js/mockCategories.js" as="script">
    
    <script>
        (function () {
            var seenImages = 0;

            function tuneImage(img) {
                if (!img || img.dataset.homeLoadTuned === 'true') return;
                img.dataset.homeLoadTuned = 'true';
                seenImages += 1;

                if (seenImages <= 10) {
                    img.decoding = 'sync';
                    img.loading = 'eager';
                    img.fetchPriority = 'high';
                } else {
                    img.decoding = 'async';
                    img.loading = 'lazy';
                    img.fetchPriority = 'low';
                }
            }

            new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    mutation.addedNodes.forEach(function (node) {
                        if (node.nodeType !== 1) return;
                        if (node.tagName === 'IMG') tuneImage(node);
                        node.querySelectorAll && node.querySelectorAll('img').forEach(tuneImage);
                    });
                });
            }).observe(document.documentElement, { childList: true, subtree: true });
        })();
    </script>

    <style>
        .product-card:hover .product-card-overlay {
            opacity: 1 !important;
        }
        .product-card:hover .product-wishlist-btn,
        .product-card:hover .product-share-btn {
            opacity: 1 !important;
        }
    </style>

    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body
    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f3; overflow-x: hidden;">

    <!-- Header Placeholder -->
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <!-- Main Content -->
    <div class="main-content" id="homeContent" style="padding-top: 155px; min-height: 100vh;">
        <!-- Populated from assets/js/homepagemockdata.js -->

    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Mock JS -->
    <script src="assets/js/authcontext.js"></script>

    <!-- Home Page Data & Renderer -->
    <script src="assets/js/homepagemockdata.js?v=2"></script>
    <script src="assets/js/renderHomePage.js?v=5"></script>

    <!-- Main JS -->
    <script src="assets/js/main.js?v=6"></script>

    <!-- Script to load Header and Footer dynamically -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof homePageMockData !== 'undefined' && typeof renderHomePage === 'function') {
                renderHomePage(homePageMockData);
            }

            document.querySelectorAll('.main-content > .container').forEach(function(section, index) {
                if (index > 2) section.classList.add('home-deferred-section');
            });

            // Load Header
            const headerReady = fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                })
                .catch(function () {
                    document.getElementById('header-placeholder').innerHTML = '';
                });

            // Load Footer
            const footerReady = fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(function () {
                    document.getElementById('footer-placeholder').innerHTML = '';
                });
        });
    </script>
</body>

</html>
