    <!-- Script to load Header/Footer dynamically & interactions -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Load Header
            fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                });

            // Load Footer
            fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });

            // Thumbnail selector interaction
            const thumbnails = document.querySelectorAll('.thumbnail-item');
            const mainImg = document.getElementById('mainProductImage');

            thumbnails.forEach(thumb => {
                thumb.addEventListener('click', function() {
                    thumbnails.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const newSrc = this.querySelector('img').getAttribute('src');
                    mainImg.setAttribute('src', newSrc);
                });
            });

            // Size button selector interaction
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Tab switching for Description and Specification
            const descriptionTabBtn = document.getElementById('descriptionTabBtn');
            const specificationTabBtn = document.getElementById('specificationTabBtn');
            const tabContentDescription = document.getElementById('tabContentDescription');
            const tabContentSpecification = document.getElementById('tabContentSpecification');

            if (descriptionTabBtn && specificationTabBtn && tabContentDescription && tabContentSpecification) {
                descriptionTabBtn.addEventListener('click', function() {
                    // Activate Description Tab Button
                    descriptionTabBtn.classList.remove('bg-light', 'text-secondary');
                    descriptionTabBtn.classList.add('bg-primary', 'text-white', 'border-primary', 'active');
                    
                    // Deactivate Specification Tab Button
                    specificationTabBtn.classList.remove('bg-primary', 'text-white', 'border-primary', 'active');
                    specificationTabBtn.classList.add('bg-light', 'text-secondary');

                    // Show/Hide Content
                    tabContentDescription.classList.remove('d-none');
                    tabContentSpecification.classList.add('d-none');
                });

                specificationTabBtn.addEventListener('click', function() {
                    // Activate Specification Tab Button
                    specificationTabBtn.classList.remove('bg-light', 'text-secondary');
                    specificationTabBtn.classList.add('bg-primary', 'text-white', 'border-primary', 'active');
                    
                    // Deactivate Description Tab Button
                    descriptionTabBtn.classList.remove('bg-primary', 'text-white', 'border-primary', 'active');
                    descriptionTabBtn.classList.add('bg-light', 'text-secondary');

                    // Show/Hide Content
                    tabContentSpecification.classList.remove('d-none');
                    tabContentDescription.classList.add('d-none');
                });
            }

            // See more / see less toggle for Description
            const descriptionParagraph = document.getElementById('descriptionParagraph');
            const seeMoreLessBtn = document.getElementById('seeMoreLessBtn');
            const seeMoreLessText = document.getElementById('seeMoreLessText');
            const seeMoreLessIcon = document.getElementById('seeMoreLessIcon');

            if (descriptionParagraph && seeMoreLessBtn && seeMoreLessText && seeMoreLessIcon) {
                const fullText = descriptionParagraph.textContent.trim();
                const limit = 145; // Approximately after "acne-fighting formula."
                const truncatedText = fullText.slice(0, limit) + "...";

                let isCollapsed = true;

                // Set initial truncated text
                descriptionParagraph.textContent = truncatedText;
                seeMoreLessText.textContent = "see more";
                seeMoreLessIcon.className = "fas fa-chevron-down";

                seeMoreLessBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (isCollapsed) {
                        // Expand
                        descriptionParagraph.textContent = fullText;
                        seeMoreLessText.textContent = "see less";
                        seeMoreLessIcon.className = "fas fa-chevron-up";
                        isCollapsed = false;
                    } else {
                        // Collapse
                        descriptionParagraph.textContent = truncatedText;
                        seeMoreLessText.textContent = "see more";
                        seeMoreLessIcon.className = "fas fa-chevron-down";
                        isCollapsed = true;
                    }
                });
            }

            // Quantity +/- selector logic
            const qtyDecreaseBtn = document.getElementById('qtyDecreaseBtn');
            const qtyIncreaseBtn = document.getElementById('qtyIncreaseBtn');
            const qtyInput = document.getElementById('qtyInput');

            if (qtyDecreaseBtn && qtyIncreaseBtn && qtyInput) {
                qtyDecreaseBtn.addEventListener('click', function() {
                    let currentVal = parseInt(qtyInput.value);
                    if (!isNaN(currentVal) && currentVal > 1) {
                        qtyInput.value = currentVal - 1;
                    }
                });

                qtyIncreaseBtn.addEventListener('click', function() {
                    let currentVal = parseInt(qtyInput.value);
                    if (!isNaN(currentVal)) {
                        qtyInput.value = currentVal + 1;
                    }
                });
            }

            // Toggle All Details Accordion
            const detailsAccordionHeader = document.getElementById('detailsAccordionHeader');
            const detailsAccordionContent = document.getElementById('detailsAccordionContent');
            const detailsAccordionIcon = document.getElementById('detailsAccordionIcon');

            if (detailsAccordionHeader && detailsAccordionContent && detailsAccordionIcon) {
                detailsAccordionHeader.addEventListener('click', function() {
                    if (detailsAccordionContent.classList.contains('d-none')) {
                        detailsAccordionContent.classList.remove('d-none');
                        detailsAccordionIcon.className = "fas fa-chevron-up";
                    } else {
                        detailsAccordionContent.classList.add('d-none');
                        detailsAccordionIcon.className = "fas fa-chevron-down";
                    }
                });
            }

            // Toggle Reviews & Ratings Accordion
            const reviewsAccordionHeader = document.getElementById('reviewsAccordionHeader');
            const reviewsSectionContent = document.getElementById('reviewsSectionContent');
            const reviewsAccordionIcon = document.getElementById('reviewsAccordionIcon');

            if (reviewsAccordionHeader && reviewsSectionContent && reviewsAccordionIcon) {
                reviewsAccordionHeader.addEventListener('click', function() {
                    if (reviewsSectionContent.classList.contains('d-none')) {
                        reviewsSectionContent.classList.remove('d-none');
                        reviewsAccordionIcon.className = "fas fa-chevron-up";
                    } else {
                        reviewsSectionContent.classList.add('d-none');
                        reviewsAccordionIcon.className = "fas fa-chevron-down";
                    }
                });
            }

            // Toast Trigger
            function showToast(message, isSuccess = true) {
                const toastEl = document.getElementById('action-toast');
                const toastBody = document.getElementById('toast-body-content');
                if (!toastEl || !toastBody) return;
                
                if (isSuccess) {
                    toastEl.classList.remove('text-bg-danger');
                    toastEl.classList.add('text-bg-success');
                    toastBody.innerHTML = `<i class="fa-solid fa-circle-check me-2"></i>${message}`;
                } else {
                    toastEl.classList.remove('text-bg-success');
                    toastEl.classList.add('text-bg-danger');
                    toastBody.innerHTML = `<i class="fa-solid fa-circle-exclamation me-2"></i>${message}`;
                }

                const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
                toast.show();
            }

            // Event Delegation for dynamically rendered Add to Cart & Wishlist buttons
            document.addEventListener('click', function(e) {
                // Add to Cart
                const addToCartBtn = e.target.closest('#addToCartBtn');
                if (addToCartBtn) {
                    if (addToCartBtn.classList.contains('go-to-cart')) {
                        window.location.href = 'mycart.html';
                        return;
                    }
                    
                    const qtyInput = document.getElementById('qtyInput');
                    const qty = qtyInput ? parseInt(qtyInput.value) : 1;
                    const productName = productDetailsData.product.title;
                    
                    // Prepare product object for cart
                    const productForCart = {
                        id: productDetailsData.product.sku,
                        title: productDetailsData.product.title,
                        image: productDetailsData.product.images[0],
                        price: productDetailsData.product.price,
                        originalPrice: '₹' + productDetailsData.product.originalPrice,
                        discount: productDetailsData.product.discount,
                        specs: productDetailsData.product.specifications ? productDetailsData.product.specifications.map(spec => spec.value) : []
                    };
                    
                    console.log('Adding to cart:', productForCart, 'Quantity:', qty);
                    
                    // Add to cart using localStorage
                    addToCart(productForCart, qty);
                    
                    console.log('Cart after adding:', getCart());
                    
                    // Update cart count in header
                    updateCartCount();
                    
                    // Change label to Go to Cart and add a class
                    addToCartBtn.innerHTML = `<i class="fas fa-shopping-cart"></i> <span>Go to Cart</span>`;
                    addToCartBtn.classList.add('go-to-cart');
                    
                    showToast(`"${productName}" (${qty} item${qty > 1 ? 's' : ''}) added to cart successfully!`);
                }

                // Add to Wishlist
                const addToWishlistBtn = e.target.closest('#addToWishlistBtn');
                if (addToWishlistBtn) {
                    e.preventDefault();
                    const productName = productDetailsData.product.title;
                    const imageHeartOverlay = document.getElementById('imageHeartOverlay');
                    
                    // Toggle heart icon classes
                    const icon = addToWishlistBtn.querySelector('i');
                    if (icon) {
                        if (icon.classList.contains('far')) {
                            icon.classList.remove('far', 'text-muted');
                            icon.classList.add('fas', 'text-danger');
                            if (imageHeartOverlay) {
                                imageHeartOverlay.classList.remove('d-none');
                            }
                            showToast(`"${productName}" added to your wishlist!`);
                        } else {
                            icon.classList.remove('fas', 'text-danger');
                            icon.classList.add('far', 'text-muted');
                            if (imageHeartOverlay) {
                                imageHeartOverlay.classList.add('d-none');
                            }
                            showToast(`"${productName}" removed from your wishlist.`);
                        }
                    }
                }
            });
        });
    </script>

    <!-- Notification Toast System -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100; margin-top: 90px;">
        <div id="action-toast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toast-body-content">
                    Action successful!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
