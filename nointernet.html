<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet Connection - Sabka Fayda</title>
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body class="vh-100 d-flex align-items-center justify-content-center bg-white text-center m-0 overflow-hidden">
    <div class="container px-4">
        <h1 class="no-internet-title">No Internet Connection</h1>
        <img src="assets/img/nointernetimg.png" alt="No Internet" class="no-internet-img">
        <p class="no-internet-text">
            Make sure wifi or cellular data is turned on and then <a href="#" onclick="checkConnection(event)" class="try-again-link">try again.</a>
        </p>
    </div>

    <script>
        function checkConnection(e) {
            if (e) e.preventDefault();
            if (navigator.onLine) {
                // If online, go back
                if (document.referrer && !document.referrer.includes('nointernet.html')) {
                    window.location.href = document.referrer;
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                // Refresh the page when clicking try again while offline
                window.location.reload();
            }
        }

        // Auto redirect back to the app as soon as connection is restored
        window.addEventListener('online', function() {
            checkConnection();
        });
    </script>
</body>
</html>
