<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (!localStorage.getItem('sf_auth_user')) {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Manage your delivery addresses on Sabka Fayda. Add, edit or remove saved shipping addresses for faster checkout.">
    <meta name="keywords"
        content="Sabka Fayda address, delivery address, shipping address, my address, manage address">
    <title>My Address | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS (includes profile styles) -->
    <link rel="stylesheet" href="assets/css/main.css?v=17">
    <!-- Preload Logo and Header Data -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">
    <link rel="preload" href="assets/js/mockCategories.js" as="script">


    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body class="orders-page">

    <!-- Site Header -->
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <!-- Page Main Shell -->
    <main class="orders-shell container-fluid px-3 px-md-4">
        
        <!-- Mobile Sidebar Toggle Row -->
        <div class="d-lg-none d-flex align-items-center mb-3 bg-white p-3 rounded-4 shadow-sm" style="border: 1px solid #eef2f6;">
            <button class="btn btn-link p-0 me-3 border-0 text-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="fa-solid fa-bars fs-3"></i>
            </button>
            <span class="fw-bold fs-5 text-dark">My Address</span>
        </div>

        <div class="row g-4">

            <!-- ═══ SIDEBAR ═══ -->
            <div class="col-lg-3" id="sidebar-placeholder"><div class="skeleton-box skeleton-sidebar d-none d-lg-block"></div></div>

            <!-- ═══ MAIN CONTENT ═══ -->
            <div class="col-lg-9 col-12 content-card" style="padding: 0; overflow: hidden;">

                <!-- Main card -->
                <div class="overflow-hidden profile-main-card">

                    <!-- Page Header -->
                    <div class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom" style="border-color:#e8eef8 !important;">
                        <h1 class="mb-0 fw-bold" style="font-size:1.15rem; color:#1a1a2e; font-family: 'Montserrat', sans-serif;">
                            <i class="fa-solid fa-location-dot me-2 text-primary"></i>My Address
                        </h1>
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-primary btn-sm px-3 py-2 fw-semibold d-inline-flex align-items-center justify-content-center" id="btn-add-address" style="font-size: 0.78rem; border-radius: 6px; gap: 6px;" onclick="toggleAddressForm()">
                                <i class="fa-solid fa-circle-plus" style="font-size: 0.9rem;"></i>Add New Address
                            </button>
                            <button type="button" class="btn btn-primary btn-sm px-3 py-2 fw-semibold d-none align-items-center justify-content-center" onclick="useCurrentLocation()" id="btn-use-location-top" style="font-size: 0.78rem; border-radius: 6px; gap: 6px;">
                                <i class="fa-solid fa-location-crosshairs" style="font-size: 0.9rem;"></i>Use Current Location
                            </button>
                        </div>
                    </div>

                    <!-- Address Content -->
                    <div class="p-4">

                        <!-- Empty state -->
                        <div class="address-empty-card text-center p-4 p-md-5" id="no-address-box">
                            <i class="fa-solid fa-location-dot d-block mb-3"></i>
                            <p class="fw-semibold text-secondary mb-1">No saved address found</p>
                            <p class="text-muted small mb-0">Add a delivery address to make checkout faster.</p>
                        </div>

                        <!-- Saved address card (shown when address exists) -->
                        <div class="d-none" id="saved-address-card">
                            <div class="border rounded-3 p-3 p-md-4 mb-3 position-relative" style="border-color: #e2e8f0 !important;">
                                <span class="badge bg-primary position-absolute" style="top: 12px; right: 12px; font-size: 0.7rem;">Default</span>
                                <h6 class="fw-bold mb-1" id="display-addr-name" style="font-size: 0.95rem; color: #1a1a2e;"></h6>
                                <p class="text-secondary mb-1" style="font-size: 0.85rem;" id="display-addr-phone"></p>
                                <p class="text-secondary mb-1" style="font-size: 0.85rem;" id="display-addr-lines"></p>
                                <p class="text-secondary mb-0" style="font-size: 0.85rem;" id="display-addr-city-state"></p>
                                <div class="d-flex gap-2 mt-3">
                                    <button class="btn btn-outline-primary btn-sm px-3 fw-semibold" style="font-size: 0.78rem; border-radius: 6px;" onclick="editSavedAddress()">
                                        <i class="fa-solid fa-pen-to-square me-1"></i>Edit
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm px-3 fw-semibold" style="font-size: 0.78rem; border-radius: 6px;" onclick="deleteSavedAddress()">
                                        <i class="fa-solid fa-trash-can me-1"></i>Remove
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Address form (collapsed by default) -->
                        <div class="d-none mt-4" id="address-form-wrap">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-name">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="addr-name" placeholder="Enter full name (letters only)" maxlength="50"
                                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-name"></div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-phone">Phone <span class="text-danger">*</span></label>
                                    <input type="tel" class="profile-form-control" id="addr-phone" placeholder="Enter 10-digit mobile number (starts with 6-9)" maxlength="10"
                                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-phone"></div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-line1">Address <span class="text-danger">*</span></label>
                                    <textarea class="profile-form-control" id="addr-line1" placeholder="Enter house / flat / block no., street, area" maxlength="200" rows="2" style="resize: vertical; min-height: 60px;"></textarea>
                                    <div class="invalid-feedback-custom d-none" id="err-line1"></div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-line2">Alternate Address</label>
                                    <textarea class="profile-form-control" id="addr-line2" placeholder="Enter alternate address / landmark (optional)" maxlength="200" rows="2" style="resize: vertical; min-height: 60px;"></textarea>
                                </div>
                                <div class="col-sm-4">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-city">City <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="addr-city" placeholder="Enter your city" maxlength="50"
                                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-city"></div>
                                </div>
                                <div class="col-sm-4">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-state">State <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="addr-state" placeholder="Enter your state" maxlength="50"
                                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-state"></div>
                                </div>
                                <div class="col-sm-4">
                                    <label class="form-label fw-semibold small text-secondary" for="addr-pin">PIN Code <span class="text-danger">*</span></label>
                                    <input type="text" class="profile-form-control" id="addr-pin" placeholder="Enter 6-digit PIN code" maxlength="6"
                                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                    <div class="invalid-feedback-custom d-none" id="err-pin"></div>
                                </div>
                                <div class="col-12 d-flex gap-2 mt-3">
                                    <button type="button" class="btn-profile-save" onclick="saveAddress()">
                                        <i class="fa-solid fa-floppy-disk me-2"></i>Save Address
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary px-4 fw-semibold" onclick="toggleAddressForm()">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>

                </div><!-- /main-card -->

            </div><!-- /main col -->
        </div><!-- /row -->
    </main><!-- /container -->

    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999; margin-top: 80px;">
        <div id="save-toast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toast-msg">
                    <i class="fa-solid fa-circle-check me-2"></i>Saved successfully!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login Mock JS -->
    <script src="assets/js/authcontext.js"></script>
    <!-- Main JS (header init) -->
    <script src="assets/js/main.js?v=6"></script>

    <!-- Load Header & Sidebar -->
    <script>
        if (typeof loadSidebar === 'function') loadSidebar();
        fetch('header.html?v=5')
            .then(r => r.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
                if (typeof initHeader === 'function') initHeader();
                if (typeof updateLoginButton === 'function') updateLoginButton();
            });

        fetch('footer.html?v=5')
            .then(r => r.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>

    <script>
        /* On page load, check if an address already exists in localStorage */
        document.addEventListener('DOMContentLoaded', function() {
            loadSavedAddress();
        });

        function loadSavedAddress() {
            const savedAddress = localStorage.getItem('userAddress');
            if (savedAddress) {
                try {
                    const addr = JSON.parse(savedAddress);
                    if (addr.city || addr.pincode || addr.line1) {
                        showSavedAddressCard(addr);
                        return;
                    }
                } catch (e) { /* ignore */ }
            }
            // No address — show empty state
            document.getElementById('no-address-box').classList.remove('d-none');
            document.getElementById('saved-address-card').classList.add('d-none');
        }

        function showSavedAddressCard(addr) {
            document.getElementById('no-address-box').classList.add('d-none');
            document.getElementById('saved-address-card').classList.remove('d-none');
            document.getElementById('address-form-wrap').classList.add('d-none');

            const btnAdd = document.getElementById('btn-add-address');
            const btnLoc = document.getElementById('btn-use-location-top');
            if (btnAdd) btnAdd.classList.remove('d-none');
            if (btnLoc) btnLoc.classList.add('d-none');

            document.getElementById('display-addr-name').textContent = addr.name || '';
            document.getElementById('display-addr-phone').textContent = addr.phone || '';
            document.getElementById('display-addr-lines').textContent = [addr.line1, addr.line2].filter(Boolean).join(', ');
            document.getElementById('display-addr-city-state').textContent = [addr.city, addr.state, addr.pincode].filter(Boolean).join(', ');
        }

        /* Toggle address form */
        function toggleAddressForm() {
            const formWrap = document.getElementById('address-form-wrap');
            const noAddressBox = document.getElementById('no-address-box');
            const savedCard = document.getElementById('saved-address-card');
            
            const btnAdd = document.getElementById('btn-add-address');
            const btnLoc = document.getElementById('btn-use-location-top');
            
            if (formWrap.classList.contains('d-none')) {
                formWrap.classList.remove('d-none');
                noAddressBox.classList.add('d-none');
                savedCard.classList.add('d-none');
                
                if (btnAdd) btnAdd.classList.add('d-none');
                if (btnLoc) btnLoc.classList.remove('d-none');
            } else {
                formWrap.classList.add('d-none');
                
                if (btnAdd) btnAdd.classList.remove('d-none');
                if (btnLoc) btnLoc.classList.add('d-none');
                
                loadSavedAddress();
            }
        }

        /* Edit existing address — populate form fields */
        function editSavedAddress() {
            const savedAddress = localStorage.getItem('userAddress');
            if (savedAddress) {
                try {
                    const addr = JSON.parse(savedAddress);
                    document.getElementById('addr-name').value = addr.name || '';
                    document.getElementById('addr-phone').value = addr.phone || '';
                    document.getElementById('addr-line1').value = addr.line1 || '';
                    document.getElementById('addr-line2').value = addr.line2 || '';
                    document.getElementById('addr-city').value = addr.city || '';
                    document.getElementById('addr-state').value = addr.state || '';
                    document.getElementById('addr-pin').value = addr.pincode || '';
                } catch (e) { /* ignore */ }
            }
            
            clearErrors();
            
            document.getElementById('no-address-box').classList.add('d-none');
            document.getElementById('saved-address-card').classList.add('d-none');
            document.getElementById('address-form-wrap').classList.remove('d-none');
            
            const btnAdd = document.getElementById('btn-add-address');
            const btnLoc = document.getElementById('btn-use-location-top');
            if (btnAdd) btnAdd.classList.add('d-none');
            if (btnLoc) btnLoc.classList.remove('d-none');
        }

        /* Delete saved address */
        function deleteSavedAddress() {
            localStorage.removeItem('userAddress');
            document.getElementById('saved-address-card').classList.add('d-none');
            document.getElementById('no-address-box').classList.remove('d-none');

            // Update header if present
            const deliveryTextEl = document.getElementById('headerDeliveryText');
            const deliveryActionEl = document.getElementById('headerDeliveryAction');
            if (deliveryTextEl) deliveryTextEl.textContent = 'Set Delivery Address';
            if (deliveryActionEl) {
                deliveryActionEl.textContent = 'Add';
                deliveryActionEl.href = 'myaddress.html';
            }

            document.getElementById('toast-msg').innerHTML =
                '<i class="fa-solid fa-circle-check me-2"></i>Address removed successfully!';
            new bootstrap.Toast(document.getElementById('save-toast'), { delay: 3000 }).show();
        }

        /* Save address */
        function saveAddress() {
            const name = (document.getElementById('addr-name').value || '').trim();
            const phone = (document.getElementById('addr-phone').value || '').trim();
            const line1 = (document.getElementById('addr-line1').value || '').trim();
            const line2 = (document.getElementById('addr-line2').value || '').trim();
            const city = (document.getElementById('addr-city').value || '').trim();
            const state = (document.getElementById('addr-state').value || '').trim();
            const pincode = (document.getElementById('addr-pin').value || '').trim();

            // Clear previous errors
            document.querySelectorAll('.invalid-feedback-custom').forEach(el => {
                el.classList.add('d-none');
                el.textContent = '';
            });
            document.querySelectorAll('.profile-form-control').forEach(el => el.style.borderColor = '');

            let hasError = false;

            // Name: only letters and spaces, max 50, required
            if (!name) {
                showFieldError('addr-name', 'err-name', 'Full name is required');
                hasError = true;
            } else if (!/^[a-zA-Z\s]+$/.test(name)) {
                showFieldError('addr-name', 'err-name', 'Only letters and spaces allowed');
                hasError = true;
            } else if (name.length > 50) {
                showFieldError('addr-name', 'err-name', 'Maximum 50 characters allowed');
                hasError = true;
            }

            // Phone: exactly 10 digits, must start with 6-9
            if (!phone) {
                showFieldError('addr-phone', 'err-phone', 'Phone number is required');
                hasError = true;
            } else if (phone.length !== 10) {
                showFieldError('addr-phone', 'err-phone', 'Enter exactly 10 digits');
                hasError = true;
            } else if (parseInt(phone[0]) <= 5) {
                showFieldError('addr-phone', 'err-phone', 'Phone must start with 6, 7, 8 or 9');
                hasError = true;
            }

            // Address: required, max 200
            if (!line1) {
                showFieldError('addr-line1', 'err-line1', 'Address is required');
                hasError = true;
            } else if (line1.length > 200) {
                showFieldError('addr-line1', 'err-line1', 'Maximum 200 characters allowed');
                hasError = true;
            }

            // City: required, only letters
            if (!city) {
                showFieldError('addr-city', 'err-city', 'City is required');
                hasError = true;
            } else if (!/^[a-zA-Z\s]+$/.test(city)) {
                showFieldError('addr-city', 'err-city', 'Only letters allowed');
                hasError = true;
            }

            // State: required, only letters
            if (!state) {
                showFieldError('addr-state', 'err-state', 'State is required');
                hasError = true;
            } else if (!/^[a-zA-Z\s]+$/.test(state)) {
                showFieldError('addr-state', 'err-state', 'Only letters allowed');
                hasError = true;
            }

            // PIN Code: only digits, exactly 6
            if (!pincode) {
                showFieldError('addr-pin', 'err-pin', 'PIN code is required');
                hasError = true;
            } else if (!/^[0-9]{6}$/.test(pincode)) {
                showFieldError('addr-pin', 'err-pin', 'Enter exactly 6 digits');
                hasError = true;
            }

            if (hasError) return;

            // Save to localStorage
            const addrObj = {
                name, phone, line1, line2, city, state, pincode
            };
            localStorage.setItem('userAddress', JSON.stringify(addrObj));

            // Update header delivery location
            const deliveryTextEl = document.getElementById('headerDeliveryText');
            const deliveryActionEl = document.getElementById('headerDeliveryAction');
            if (deliveryTextEl && (city || pincode)) {
                deliveryTextEl.textContent = 'Delivering to ' + [city, pincode].filter(Boolean).join(' ');
            }
            if (deliveryActionEl && (city || pincode)) {
                deliveryActionEl.textContent = 'Update';
                deliveryActionEl.href = 'myaddress.html';
            }

            document.getElementById('toast-msg').innerHTML =
                '<i class="fa-solid fa-circle-check me-2"></i>Address saved successfully!';
            new bootstrap.Toast(document.getElementById('save-toast'), { delay: 3000 }).show();

            showSavedAddressCard(addrObj);
        }

        /* Show field error */
        function showFieldError(fieldId, errId, message) {
            const field = document.getElementById(fieldId);
            const errEl = document.getElementById(errId);
            if (field) field.style.borderColor = '#dc3545';
            if (errEl) {
                errEl.textContent = message;
                errEl.classList.remove('d-none');
            }
        }

        function clearErrors() {
            const fields = ['addr-name', 'addr-phone', 'addr-line1', 'addr-city', 'addr-state', 'addr-pin'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                if (el) el.style.borderColor = '#e2e8f0';
            });
            document.querySelectorAll('.invalid-feedback-custom').forEach(el => el.classList.add('d-none'));
        }

        /* Use Current Location - Currently Unavailable */
        function useCurrentLocation() {
            const toastMsg = document.getElementById('toast-msg');
            const toastEl = document.getElementById('save-toast');
            
            toastMsg.innerHTML = '<i class="fa-solid fa-circle-info me-2"></i>This feature is not available right now, it will be available in the future.';
            
            // Swap colors to info theme
            toastEl.classList.remove('text-bg-success');
            toastEl.classList.add('text-bg-info', 'text-white');
            
            const toastInstance = new bootstrap.Toast(toastEl, { delay: 3000 });
            toastInstance.show();

            // Reset classes after hidden so success toasts still look green
            toastEl.addEventListener('hidden.bs.toast', function resetToastColor() {
                toastEl.classList.remove('text-bg-info', 'text-white');
                toastEl.classList.add('text-bg-success');
                toastEl.removeEventListener('hidden.bs.toast', resetToastColor);
            });
        }
    </script>
</body>
</html>
