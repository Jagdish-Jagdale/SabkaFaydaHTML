<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Oops! The page you are looking for could not be found. Go back to Sabka Fayda homepage and continue shopping.">
    <title>404 – Page Not Found | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="assets/css/main.css?v=17">

    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">

    <style>
        body {
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background-color: #f8faff;
            overflow-x: hidden;
        }

        /* ── 404 Hero Section ── */
        .error-page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 120px;
            padding-bottom: 60px;
        }

        /* Left text column */
        .error-text-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fee2e2;
            color: #b91c1c;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 18px;
            width: fit-content;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1;
            color: #1a1a2e;
            margin-bottom: 6px;
            letter-spacing: -2px;
        }

        .error-code span {
            color: #0087F6;
        }

        .error-oops {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 800;
            color: #0087F6;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .error-desc {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.7;
            max-width: 380px;
            margin-bottom: 36px;
        }

        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a1a2e;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 13px 28px;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 18px rgba(26, 26, 46, 0.22);
        }

        .btn-home:hover {
            background: #0087F6;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 135, 246, 0.32);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 13px 22px;
            border-radius: 50px;
            text-decoration: none;
            border: 1.5px solid #d1d5db;
            background: #fff;
            transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        .btn-back:hover {
            border-color: #0087F6;
            color: #0087F6;
            transform: translateY(-2px);
        }

        /* Right image column */
        .error-img-col {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-img-wrap {
            position: relative;
            width: 100%;
            max-width: 560px;
        }

        .error-img-wrap img {
            width: 100%;
            height: auto;
            /* Floating animation */
            animation: float-img 4s ease-in-out infinite;
            filter: drop-shadow(0 20px 40px rgba(0, 135, 246, 0.08));
        }

        @keyframes float-img {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-14px); }
        }

        /* Decorative background blobs */
        .blob-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,135,246,0.10) 0%, transparent 70%);
            top: -40px;
            right: -40px;
            border-radius: 50%;
            pointer-events: none;
        }

        .blob-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,135,246,0.07) 0%, transparent 70%);
            bottom: -20px;
            left: -20px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Divider line */
        .error-divider {
            width: 56px;
            height: 4px;
            background: linear-gradient(90deg, #0087F6, #33a8ff);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* Quick links */
        .quick-links-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #9ca3af;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
            margin-top: 28px;
        }

        .quick-link-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            padding: 6px 14px;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, transform 0.15s;
            margin: 3px 4px 3px 0;
        }

        .quick-link-chip:hover {
            border-color: #0087F6;
            color: #0087F6;
            transform: translateY(-1px);
        }

        /* Mobile adjustments */
        @media (max-width: 991px) {
            .error-page-wrap {
                flex-direction: column-reverse;
                padding-top: 100px;
                text-align: center;
            }
            .error-text-col {
                align-items: center;
                text-align: center;
            }
            .error-desc { max-width: 100%; }
            .error-divider { margin: 0 auto 20px; }
            .error-img-wrap { max-width: 360px; margin-bottom: 32px; }
            .quick-link-chip { margin: 3px 2px; }
        }

        @media (max-width: 480px) {
            .error-actions { flex-direction: column; align-items: stretch; }
            .btn-home, .btn-back { justify-content: center; }
        }
    </style>
</head>

<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"><div class="skeleton-box skeleton-header"></div></div>

    <!-- ── 404 Main Content ── -->
    <main>
        <div class="container error-page-wrap" style="max-width: 1100px;">

            <!-- LEFT: Text Content -->
            <div class="row align-items-center w-100 g-5">
                <div class="col-lg-5 error-text-col">

                    <!-- Error badge -->
                    <div class="error-badge">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        Error 404
                    </div>

                    <!-- 404 large number -->
                    <h1 class="error-code">4<span>0</span>4</h1>

                    <!-- Divider -->
                    <div class="error-divider"></div>

                    <!-- OOPS label -->
                    <p class="error-oops mb-1">OOPS!!</p>

                    <!-- Main title -->
                    <h2 class="error-title">Page Not Found</h2>

                    <!-- Description -->
                    <p class="error-desc">
                        This page doesn't exist or maybe fell asleep!<br>
                        We suggest you go back to home and continue your shopping journey.
                    </p>

                    <!-- Action Buttons -->
                    <div class="error-actions">
                        <a href="index.html" class="btn-home">
                            <i class="fa-solid fa-house"></i>
                            Back to Home
                        </a>
                        <a href="javascript:history.back()" class="btn-back">
                            <i class="fa-solid fa-arrow-left"></i>
                            Go Back
                        </a>
                    </div>

                    <!-- Quick Links -->
                    <p class="quick-links-label">Quick Links</p>
                    <div>
                        <a href="category.html" class="quick-link-chip">
                            <i class="fa-solid fa-tag" style="color:#0087F6;font-size:0.7rem;"></i>
                            Shop Now
                        </a>
                        <a href="myorders.html" class="quick-link-chip">
                            <i class="fa-solid fa-bag-shopping" style="color:#0087F6;font-size:0.7rem;"></i>
                            My Orders
                        </a>
                        <a href="mycart.html" class="quick-link-chip">
                            <i class="fa-solid fa-cart-shopping" style="color:#0087F6;font-size:0.7rem;"></i>
                            My Cart
                        </a>
                        <a href="mywishlist.html" class="quick-link-chip">
                            <i class="fa-solid fa-heart" style="color:#0087F6;font-size:0.7rem;"></i>
                            Wishlist
                        </a>
                    </div>

                </div>

                <!-- RIGHT: Illustration -->
                <div class="col-lg-7 error-img-col">
                    <div class="error-img-wrap">
                        <div class="blob-1"></div>
                        <div class="blob-2"></div>
                        <img src="assets/img/error_404_img.png"
                             alt="404 Page Not Found — A person looking confused at a 404 street sign"
                             loading="eager">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"><div class="skeleton-box skeleton-footer"></div></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login Mock JS -->
    <script src="assets/js/loginmock.js"></script>
    <!-- Main JS -->
    <script src="assets/js/main.js?v=7"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load Header
            fetch('header.html?v=5')
                .then(r => r.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') initHeader();
                })
                .catch(e => console.error('Error loading header:', e));

            // Load Footer
            fetch('footer.html?v=5')
                .then(r => r.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(e => console.error('Error loading footer:', e));
        });
    </script>
</body>

</html>
