<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Sabka Fayda support via WhatsApp for instant assistance with orders, products, and services.">
    <meta name="keywords" content="Sabka Fayda WhatsApp support, customer service, instant help, order support">
    <title>WhatsApp Support | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css?v=15">

    <!-- Preload Logo Image -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">

    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body class="orders-page">
    <div id="header-placeholder">
        <div class="skeleton-box skeleton-header"></div>
    </div>

    <main class="container-fluid px-3 px-md-4 py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="details-card text-center py-5">
                    <div class="mb-4">
                        <div class="d-inline-flex justify-content-center align-items-center rounded-circle bg-success bg-opacity-10 mb-3" style="width: 120px; height: 120px;">
                            <i class="fa-brands fa-whatsapp text-success fs-1"></i>
                        </div>
                        <h2 class="fw-bold mb-2">WhatsApp Support</h2>
                        <p class="text-secondary mb-0">Get instant help from our support team</p>
                    </div>

                    <div class="rounded-3 p-4 mb-4" style="background: #f8fbff; border: 1px solid #e4edf8;">
                        <div class="mb-3">
                            <p class="text-secondary small mb-1">Contact us on WhatsApp</p>
                            <h3 class="fw-bold text-success mb-0">+91 76669 12745</h3>
                        </div>
                        <p class="text-secondary small mb-0">Available 24/7 for your assistance</p>
                    </div>

                    <div class="d-flex flex-column gap-3">
                        <a href="https://wa.me/7666912745" target="_blank" class="btn btn-success py-3 fw-semibold d-flex align-items-center justify-content-center gap-2" style="border-radius: 8px; font-size: 1rem;">
                            <i class="fa-brands fa-whatsapp fs-5"></i> Chat on WhatsApp
                        </a>
                        <a href="contact-us.html" class="btn btn-outline-primary py-3 fw-semibold" style="border-radius: 8px; font-size: 1rem;">
                            <i class="fa-solid fa-envelope me-2"></i> Contact Form
                        </a>
                    </div>

                    <div class="mt-4 pt-4 border-top" style="border-color: #e2e8f0;">
                        <h6 class="fw-bold mb-3">How can we help you?</h6>
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="p-3 rounded-3" style="background: #f8fbff; border: 1px solid #e4edf8;">
                                    <i class="fa-solid fa-box text-primary mb-2 fs-5"></i>
                                    <p class="fw-semibold small mb-0">Order Issues</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 rounded-3" style="background: #f8fbff; border: 1px solid #e4edf8;">
                                    <i class="fa-solid fa-rotate text-primary mb-2 fs-5"></i>
                                    <p class="fw-semibold small mb-0">Returns & Refunds</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 rounded-3" style="background: #f8fbff; border: 1px solid #e4edf8;">
                                    <i class="fa-solid fa-credit-card text-primary mb-2 fs-5"></i>
                                    <p class="fw-semibold small mb-0">Payment Help</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 rounded-3" style="background: #f8fbff; border: 1px solid #e4edf8;">
                                    <i class="fa-solid fa-circle-question text-primary mb-2 fs-5"></i>
                                    <p class="fw-semibold small mb-0">General Queries</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder">
        <div class="skeleton-box skeleton-footer"></div>
    </div>

    <!-- Include Floating WhatsApp -->
    <div id="whatsapp-float-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/authcontext.js"></script>
    <script src="assets/js/main.js?v=6"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Load header
            fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                });

            // Load footer
            fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });

            // Load floating WhatsApp
            fetch('whatsapp-float.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('whatsapp-float-placeholder').innerHTML = data;
                });
        });
    </script>
</body>

</html>
