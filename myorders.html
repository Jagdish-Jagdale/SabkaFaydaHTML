<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (!localStorage.getItem('sf_auth_user')) {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="View and manage your Sabka Fayda orders, delivery status, spending summary, and order history.">
    <meta name="keywords"
        content="Sabka Fayda orders, my orders, order history, track order, delivered orders, cancelled orders">
    <title>My Orders | Sabka Fayda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css?v=17">
    <!-- Preload Logo and Header Data -->
    <link rel="preload" href="assets/img/sflogo.png" as="image" fetchpriority="high">
    <link rel="preload" href="assets/js/mockCategories.js" as="script">


    <!-- Preload Dynamic Components -->
    <link rel="preload" href="header.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="sidebar.html?v=5" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="footer.html?v=5" as="fetch" crossorigin="anonymous">
</head>

<body class="orders-page">
    <div id="header-placeholder">
        <div class="skeleton-box skeleton-header"></div>
    </div>

    <main class="orders-shell container-fluid px-3 px-md-4">

        <!-- Mobile Sidebar Toggle Row -->
        <div class="d-lg-none d-flex align-items-center mb-3 bg-white p-3 rounded-4 shadow-sm"
            style="border: 1px solid #eef2f6;">
            <button class="btn btn-link p-0 me-3 border-0 text-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="fa-solid fa-bars fs-3"></i>
            </button>
            <span class="fw-bold fs-5 text-dark">My Orders</span>
        </div>

        <div class="row g-4">
            <aside class="col-lg-3" id="sidebar-placeholder">
                <div class="skeleton-box skeleton-sidebar d-none d-lg-block"></div>
            </aside>

            <section class="col-lg-9 col-12 content-card">
                <div class="orders-summary-grid mb-3">
                    <article class="orders-stat-card">
                        <span class="orders-stat-icon stat-blue"><i class="fa-solid fa-indian-rupee-sign"></i></span>
                        <div>
                            <p>Total Spend</p>
                            <h2>&#8377; 48,950</h2>
                            <span>All Time</span>
                        </div>
                    </article>
                    <article class="orders-stat-card">
                        <span class="orders-stat-icon stat-purple"><i class="fa-solid fa-chart-simple"></i></span>
                        <div>
                            <p>Average Order Value</p>
                            <h2>&#8377; 1,956</h2>
                            <span>All Time</span>
                        </div>
                    </article>
                    <article class="orders-stat-card">
                        <span class="orders-stat-icon stat-green"><i class="fa-solid fa-bag-shopping"></i></span>
                        <div>
                            <p>Total Orders</p>
                            <h2>25</h2>
                            <span>All Time</span>
                        </div>
                    </article>
                    <article class="orders-stat-card">
                        <span class="orders-stat-icon stat-orange"><i class="fa-solid fa-box-open"></i></span>
                        <div>
                            <p>Items Purchased</p>
                            <h2>38</h2>
                            <span>All Time</span>
                        </div>
                    </article>
                </div>

                <div class="orders-toolbar bg-white shadow-sm mb-3">
                    <div class="orders-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="search" placeholder="Search by Order ID, Product or Brand...">
                    </div>
                    <div class="dropdown">
                        <button class="orders-sort-btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            <span>Sort By:</span>
                            Latest First
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end orders-dropdown">
                            <li><a class="dropdown-item active" href="#">Latest First</a></li>
                            <li><a class="dropdown-item" href="#">Oldest First</a></li>
                            <li><a class="dropdown-item" href="#">Highest Amount</a></li>
                            <li><a class="dropdown-item" href="#">Lowest Amount</a></li>
                        </ul>
                    </div>
                </div>

                <div class="orders-filter-row mb-3">
                    <button class="orders-filter-chip active">All (25)</button>
                    <button class="orders-filter-chip">Confirmed (3)</button>
                    <button class="orders-filter-chip">Order Placed (2)</button>
                    <button class="orders-filter-chip">Shipped (4)</button>
                    <button class="orders-filter-chip">In Transit (3)</button>
                    <button class="orders-filter-chip">Out for Delivery (2)</button>
                    <button class="orders-filter-chip">Delivered (8)</button>
                    <button class="orders-filter-chip">Cancelled (3)</button>
                    <button class="orders-filter-chip">Returned (0)</button>
                </div>

                <div class="orders-list" id="ordersContainer">
                    <!-- Orders will be injected here dynamically by renderUI.js -->
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder">
        <div class="skeleton-box skeleton-footer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/authcontext.js"></script>
    <script src="assets/js/main.js?v=6"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof loadSidebar === 'function') loadSidebar();

            // Load header
            fetch('header.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    if (typeof initHeader === 'function') {
                        initHeader();
                    }
                    if (typeof updateLoginButton === 'function') {
                        updateLoginButton();
                    }
                });

            // Load footer
            fetch('footer.html?v=5')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });

            // Order ID Copying Feature (event delegation - works after dynamic render)
            document.addEventListener('click', function (e) {
                if (e.target.classList.contains('fa-copy')) {
                    const orderIdStrong = e.target.previousElementSibling;
                    const orderIdText = orderIdStrong ? orderIdStrong.textContent.trim() : '';
                    navigator.clipboard.writeText(orderIdText).then(() => {
                        e.target.classList.remove('fa-regular', 'fa-copy');
                        e.target.classList.add('fa-solid', 'fa-check', 'text-success');
                        setTimeout(() => {
                            e.target.classList.remove('fa-solid', 'fa-check', 'text-success');
                            e.target.classList.add('fa-regular', 'fa-copy');
                        }, 1500);
                    });
                }
            });
        });
    </script>

    <script src="assets/js/mockData.js"></script>
    <script src="assets/js/renderOrders.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof mockData !== 'undefined' && mockData.orders) {
                renderOrders(mockData.orders);
            }
        });
    </script>
</body>

</html>
